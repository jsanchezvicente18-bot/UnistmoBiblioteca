<div class="form-container">
  <h2>Mandar reporte</h2>

  <form>
    <label>Tipo de problema:</label>
    <select>
      <option>Problema con libros</option>
      <option>Problema con préstamos</option>
      <option>Problema con usuarios</option>
      <option>Error del sistema</option>
      <option>Otro</option>
    </select>

    <label>Descripción:</label>
    <textarea placeholder="Describe el problema o reporte"></textarea>

    <button type="submit">Enviar reporte</button>
  </form>
</div>
