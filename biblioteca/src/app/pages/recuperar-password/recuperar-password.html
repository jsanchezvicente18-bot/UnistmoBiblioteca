<div class="recuperar-container">

  <h2>🔐 Recuperar Contraseña</h2>

  <p class="descripcion">
    Ingresa tu correo electrónico para recuperar el acceso a tu cuenta.
  </p>

  <div *ngIf="!usuarioEncontrado">
    <label>Correo electrónico</label>
    <input 
      type="email" 
      [(ngModel)]="correo" 
      placeholder="Ingresa tu correo"
    >

    <button type="button" (click)="buscarUsuario()">
      Buscar cuenta
    </button>
  </div>

  <div *ngIf="usuarioEncontrado">
    <label>Nueva contraseña</label>
    <input 
      type="password" 
      [(ngModel)]="nuevaPassword"
      placeholder="Nueva contraseña"
    >

    <label>Confirmar contraseña</label>
    <input 
      type="password" 
      [(ngModel)]="confirmarPassword"
      placeholder="Confirmar contraseña"
    >

    <button type="button" (click)="cambiarPassword()">
      Cambiar contraseña
    </button>
  </div>

  <p *ngIf="mensaje" class="mensaje">
    {{ mensaje }}
  </p>

</div>
