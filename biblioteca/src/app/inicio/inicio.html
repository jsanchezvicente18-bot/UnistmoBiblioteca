<div class="bienvenida">

    <img src="/img/logo.png" alt="Logo de la Universidad" class="logo-biblioteca">

    <h1>Biblioteca Universidad del Istmo</h1>

    <p>Sistema de Gestión Bibliotecaria</p>
</div>

<div class="cards">

    <div class="card">
        <div class="icono">📚</div>
        <h2>{{ totalLibros }}</h2>
        <p>Total de Libros</p>
    </div>

    <div class="card">
        <div class="icono">👥</div>
        <h2>{{ totalUsuarios }}</h2>
        <p>Usuarios Registrados</p>
    </div>

    <div class="card">
        <div class="icono">🔄</div>
        <h2>{{ prestamosActivos }}</h2>
        <p>Préstamos Activos</p>
    </div>

    <div class="card">
        <div class="icono">✅</div>
        <h2>{{ librosDisponibles }}</h2>
        <p>Libros Disponibles</p>
    </div>

</div>
