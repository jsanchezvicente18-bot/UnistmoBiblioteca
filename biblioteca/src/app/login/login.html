<div class="login-container">

  <div class="login-card">

    <img src="/img/logo2.png" alt="Logo de la Universidad" class="logo-biblioteca">

    <h1>Biblioteca Universidad del Istmo</h1>
    <p class="subtitulo">
      Sistema de Gestión Bibliotecaria
    </p>

    <input
      type="text"
      placeholder="Matrícula"
      [(ngModel)]="matricula"
       name="matricula"
    >

    <input
       type="password"
       placeholder="Contraseña"
      [(ngModel)]="password"
       name="password"
    >

    <button (click)="ingresar()">
      Iniciar Sesión
    </button>

    <p class="registro">
      ¿No tienes cuenta?
    </p>

    <a routerLink="/registro">
      Registrarse
    </a>

    <p class="recuperar">
      <a routerLink="/recuperar-password">
      ¿Olvidaste tu contraseña?
      </a>
    </p>

  </div>

</div>
