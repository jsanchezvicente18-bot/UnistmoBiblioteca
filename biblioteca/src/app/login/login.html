<div class="login-container">

  <div class="login-card">


<img
  src="/img/logo2.png"
  alt="Logo de la Biblioteca"
  class="logo-biblioteca">

<h1>Biblioteca Digital UNISTMO</h1>

<p class="subtitulo">
  Sistema de Gestión Bibliotecaria
</p>


<input
  type="text"
  placeholder="Correo electrónico o matrícula"
  [(ngModel)]="matricula"
  name="matricula">

  <div class="password-container">

  <input
    [type]="mostrarPassword ? 'text' : 'password'"
    placeholder="Contraseña"
    [(ngModel)]="password"
    name="password">

  <button
    type="button"
    class="btn-password"
    (click)="mostrarPassword = !mostrarPassword">

    {{ mostrarPassword ? '🙈' : '👁️' }}

  </button>

</div>
<button
  class="btn-login"
  (click)="ingresar()">

  Iniciar Sesión

</button>


<p class="recuperar">

  <a routerLink="/recuperar-password">

     Recuperar contraseña

  </a>

</p>

<p class="registro">

  ¿No tienes cuenta?

  <a routerLink="/registro">

    Crear cuenta

  </a>

</p>

<div class="ayuda-login">

  <a routerLink="/manual-usuario">
    📖 Manual de usuario
  </a>

  <a routerLink="/contactar-admin">
    📧 Contactar administrador
  </a>

  <a routerLink="/reportar-error">
    🚨 Reportar error
  </a>

</div>

<div class="footer-login">

  <p>
    📚 Biblioteca Digital UNISTMO
  </p>

  <p>
    Versión 1.0
  </p>

  <p>
    © 2026 Todos los derechos reservados
  </p>

</div>

  </div>

</div>
