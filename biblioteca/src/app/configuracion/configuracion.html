<h1>⚙️ Configuración del Sistema</h1>

<div class="config-grid">

  <div class="config-card">
    <h3>🏫 Información de la Biblioteca</h3>

    <label>Nombre de la Biblioteca</label>
    <input type="text" value="Biblioteca UNISTMO">

    <label>Correo Institucional</label>
    <input type="email" value="biblioteca@unistmo.edu.mx">

    <label>Teléfono</label>
    <input type="text" value="971 000 0000">

    <button>Guardar Cambios</button>
  </div>

  <div class="config-card">
    <h3>👤 Perfil del Administrador</h3>

    <label>Nombre</label>
    <input type="text" value="Administrador">

    <label>Correo</label>
    <input type="email" value="admin@unistmo.edu.mx">

    <label>Nueva Contraseña</label>
    <input type="password">

    <button>Actualizar Perfil</button>
  </div>

  <div class="config-card">
    <h3>🎨 Apariencia</h3>

    <p>Tema actual: Rojo Institucional</p>

    <button>Cambiar Tema</button>
  </div>

  <div class="config-card">
    <h3>💾 Base de Datos</h3>

    <p>Estado de conexión:</p>

    <span class="estado">Conectado</span>

    <button>Verificar Conexión</button>
  </div>

</div>
